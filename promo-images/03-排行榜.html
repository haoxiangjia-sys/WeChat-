<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1920px; overflow: hidden;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(180deg, #1aad19 0%, #1aad19 500px, #f5f5f5 500px);
}
.header {
  text-align: center; padding: 100px 80px 60px;
}
.header-title {
  font-size: 72px; font-weight: 900; color: #fff;
  letter-spacing: 8px; margin-bottom: 20px;
}
.header-sub {
  font-size: 32px; color: rgba(255,255,255,0.8);
}

.leaderboard { padding: 0 80px; }
.card {
  display: flex; align-items: center;
  background: #fff; border-radius: 28px;
  padding: 40px 50px; margin-bottom: 24px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.06);
}
.card.gold { border: 4px solid #f0ad4e; background: linear-gradient(135deg, #fffbe6, #fff); }
.card.silver { border: 4px solid #bbb; background: linear-gradient(135deg, #f8f8f8, #fff); }
.card.bronze { border: 4px solid #d4a574; background: linear-gradient(135deg, #fef5ee, #fff); }

.rank {
  width: 90px; text-align: center; font-size: 48px;
  margin-right: 30px; flex-shrink: 0;
}
.info { flex: 1; }
.nickname { font-size: 40px; color: #333; font-weight: bold; display: block; }
.time { font-size: 26px; color: #bbb; margin-top: 6px; display: block; }
.score-val {
  font-size: 64px; font-weight: 900; color: #1aad19;
  flex-shrink: 0;
}
.score-label { font-size: 28px; color: #999; }

.cta {
  margin-top: 80px; text-align: center;
}
.cta-text {
  font-size: 40px; color: #1aad19; font-weight: bold;
  letter-spacing: 4px;
}
.cta-sub {
  font-size: 28px; color: #999; margin-top: 16px; display: block;
}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">排行榜 TOP 3</div>
  <div class="header-sub">谁是答题之王？</div>
</div>

<div class="leaderboard">
  <div class="card gold">
    <div class="rank">🥇</div>
    <div class="info">
      <span class="nickname">编程小达人</span>
      <span class="time">2026-05-20 10:30</span>
    </div>
    <div class="score-val">10<span class="score-label">分</span></div>
  </div>
  <div class="card silver">
    <div class="rank">🥈</div>
    <div class="info">
      <span class="nickname">Java爱好者</span>
      <span class="time">2026-05-20 09:15</span>
    </div>
    <div class="score-val">9<span class="score-label">分</span></div>
  </div>
  <div class="card bronze">
    <div class="rank">🥉</div>
    <div class="info">
      <span class="nickname">代码诗人</span>
      <span class="time">2026-05-20 08:45</span>
    </div>
    <div class="score-val">8<span class="score-label">分</span></div>
  </div>
</div>

<div class="cta">
  <div class="cta-text">快来挑战，超越他们！</div>
  <span class="cta-sub">扫码立即参与答题</span>
</div>
</body>
</html>
