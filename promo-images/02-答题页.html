<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1920px; overflow: hidden;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #f5f5f5;
}
.page { padding: 80px; height: 100%; display: flex; flex-direction: column; }
.top-bar { margin-bottom: 50px; }
.progress-bg {
  width: 100%; height: 16px; background: #e0e0e0;
  border-radius: 8px; overflow: hidden; margin-bottom: 30px;
}
.progress-fill { width: 30%; height: 100%; background: #1aad19; border-radius: 8px; }
.info-row { display: flex; justify-content: space-between; align-items: center; }
.q-count { font-size: 28px; color: #666; }
.timer { font-size: 56px; font-weight: bold; color: #e64340; }
.score { font-size: 32px; color: #1aad19; font-weight: bold; }

.question-card {
  background: #fff; border-radius: 28px; padding: 60px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.06); margin-bottom: 50px;
}
.question-text { font-size: 44px; line-height: 1.8; color: #333; font-weight: 500; }

.options { display: flex; flex-direction: column; gap: 30px; flex: 1; }
.option {
  display: flex; align-items: center;
  background: #fff; border: 4px solid #e0e0e0;
  border-radius: 24px; padding: 36px 40px;
}
.option.correct { border-color: #1aad19; background: #e8f8e8; }
.option.wrong { border-color: #e64340; background: #fef0f0; }
.option-letter {
  width: 80px; height: 80px; line-height: 80px; text-align: center;
  font-size: 36px; font-weight: bold; color: #fff;
  background: #1aad19; border-radius: 50%; margin-right: 30px; flex-shrink: 0;
}
.option-text { font-size: 38px; color: #333; flex: 1; }
.option-icon { font-size: 40px; font-weight: bold; }
.correct .option-icon { color: #1aad19; }
.wrong .option-icon { color: #e64340; }

.tag-line {
  margin-top: 60px; text-align: center;
  font-size: 36px; color: #999; letter-spacing: 4px;
}
</style>
</head>
<body>
<div class="page">
  <div class="top-bar">
    <div class="progress-bg"><div class="progress-fill"></div></div>
    <div class="info-row">
      <span class="q-count">第 3 / 10 题</span>
      <span class="timer">09s</span>
      <span class="score">得分: 2</span>
    </div>
  </div>

  <div class="question-card">
    <div class="question-text">Java 中，哪个关键字用于实现继承？</div>
  </div>

  <div class="options">
    <div class="option correct">
      <div class="option-letter">A</div>
      <div class="option-text">extends</div>
      <div class="option-icon">✓</div>
    </div>
    <div class="option wrong">
      <div class="option-letter">B</div>
      <div class="option-text">implements</div>
      <div class="option-icon">✗</div>
    </div>
    <div class="option">
      <div class="option-letter">C</div>
      <div class="option-text">inherit</div>
      <div class="option-icon"></div>
    </div>
    <div class="option">
      <div class="option-letter">D</div>
      <div class="option-text">super</div>
      <div class="option-icon"></div>
    </div>
  </div>

  <div class="tag-line">限时 15 秒 · 答对得分</div>
</div>
</body>
</html>
